timezone: Asia/Shanghai
log_level: INFO

research:
  directions:
    - "大语言模型智能体在科研自动化中的应用"
    - "检索增强生成、论文理解、科学发现工作流"
  keywords:
    - "large language model"
    - "LLM agent"
    - "retrieval augmented generation"
    - "scientific discovery"
    - "paper reading"
  negative_keywords:
    - "survey of surveys"
  lookback_hours: 24
  max_papers: 10

sources:
  arxiv:
    enabled: true
    max_results: 80
    categories:
      - cs.CL
      - cs.AI
      - cs.LG
  openalex:
    enabled: true
    max_results: 80
  semantic_scholar:
    enabled: true
    max_results: 50
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
    query:
    endpoint: "https://api.semanticscholar.org/graph/v1/paper/search"
  elsevier:
    enabled: false
    api_key_env: ELSEVIER_API_KEY
    max_results: 50
  ieee:
    enabled: false
    api_key_env: IEEE_API_KEY
    max_results: 50
  nature:
    enabled: true
    max_results: 50
    rss_urls:
      - "https://www.nature.com/nature.rss"
      - "https://www.nature.com/natcomputsci.rss"
  science:
    enabled: true
    max_results: 50
    rss_urls:
      - "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=science"

deepseek:
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  base_url_env: DEEPSEEK_BASE_URL
  model: deepseek-v4-flash
  model_env: DEEPSEEK_MODEL
  max_tokens: 12000
  temperature: 0.2
  thinking_type:
  reasoning_effort:
  timeout_seconds: 120

email:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_host_env: SMTP_HOST
  smtp_port: 587
  use_tls: true
  username_env: SMTP_USERNAME
  password_env: SMTP_PASSWORD
  sender_env: SMTP_SENDER
  recipients_env: SMTP_RECIPIENTS
  subject_prefix: "每日论文阅读日报"
