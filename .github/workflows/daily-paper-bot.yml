name: Daily Paper Reading Report

on:
  schedule:
    # 00:30 UTC is 08:30 in Beijing time.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-report:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
      SMTP_RECIPIENTS: ${{ secrets.SMTP_RECIPIENTS }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
      IEEE_API_KEY: ${{ secrets.IEEE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run daily report
        run: |
          CONFIG_FILE="config.yaml"
          if [ ! -f "$CONFIG_FILE" ]; then
            CONFIG_FILE="config.example.yaml"
          fi
          paper-daily-reading-bot --config "$CONFIG_FILE"
